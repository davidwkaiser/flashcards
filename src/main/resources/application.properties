spring.application.name=flashcards-api
server.port=8080

# PostgreSQL database configuration for local development
spring.datasource.url=jdbc:postgresql://localhost:5432/flashcards_db
spring.datasource.username=flashcards_user
spring.datasource.password=flashcards_pwd
spring.datasource.driver-class-name=org.postgresql.Driver

# H2 console disabled when using Postgres
spring.h2.console.enabled=false

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.flashcards=DEBUG
# JWT config - override these in production with secure values
jwt.secret=change-me-please-which-should-be-long-and-random-32-bytes-minimum
jwt.expirationMs=3600000