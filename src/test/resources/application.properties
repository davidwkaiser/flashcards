spring.datasource.url=jdbc:postgresql://localhost:5432/flashcards_db
spring.datasource.username=flashcards_user
spring.datasource.password=flashcards_pwd
spring.datasource.driver-class-name=org.postgresql.Driver
spring.h2.console.enabled=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Use PostgreSQL for tests as well; ensure the local Postgres container is running.
